<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>雪梨拼读 - 背单词</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B9D; --primary-dark: #E5547F;
            --success: #4ECDC4; --success-dark: #3DBDB5;
            --warning: #FFD93D; --danger: #FF6B6B;
            --bg: #FFF5F8; --card: #FFFFFF; --text: #2D3436; --text-light: #636E72;
            --shadow: 0 8px 30px rgba(255,107,157,0.15); --radius: 20px;
            --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
        body { font-family:'Nunito',-apple-system,sans-serif; background:var(--bg); min-height:100vh; color:var(--text); overflow-x:hidden; padding-top:var(--safe-top); padding-bottom:var(--safe-bottom); }
        .app { max-width:768px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }
        .header { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; padding:20px; padding-top:calc(20px + var(--safe-top)); border-radius:0 0 30px 30px; text-align:center; }
        .header h1 { font-size:1.8rem; font-weight:800; }
        .header p { font-size:0.9rem; opacity:0.9; margin-top:4px; }
        .content { flex:1; padding:20px; padding-bottom:calc(100px + var(--safe-bottom)); }
        .page { display:none; animation:fadeIn 0.3s ease; }
        .page.active { display:block; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px; }
        .stat-card { background:var(--card); border-radius:var(--radius); padding:16px 12px; text-align:center; box-shadow:var(--shadow); }
        .stat-icon { font-size:1.8rem; margin-bottom:8px; }
        .stat-value { font-size:1.6rem; font-weight:800; color:var(--primary); }
        .stat-label { font-size:0.75rem; color:var(--text-light); margin-top:4px; }
        .section-title { font-size:1.1rem; font-weight:700; color:var(--text); margin:20px 0 12px; display:flex; align-items:center; gap:8px; }
        .section-title::before { content:''; width:4px; height:20px; background:var(--primary); border-radius:2px; }
        .chapter-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:8px; }
        .chapter-btn { background:var(--card); border-radius:16px; padding:16px 14px; text-align:left; box-shadow:var(--shadow); cursor:pointer; transition:all 0.2s; border:2px solid transparent; width:100%; font-family:inherit; position:relative; overflow:hidden; }
        .chapter-btn:active { transform:scale(0.97); }
        .chapter-btn .ch-icon { font-size:1.5rem; margin-bottom:6px; }
        .chapter-btn .ch-title { font-size:0.88rem; font-weight:700; color:var(--text); margin-bottom:4px; line-height:1.3; }
        .chapter-btn .ch-sub { font-size:0.72rem; color:var(--text-light); }
        .chapter-btn .ch-bar-wrap { margin-top:8px; height:5px; background:#F0F0F0; border-radius:3px; overflow:hidden; }
        .chapter-btn .ch-bar { height:100%; background:linear-gradient(90deg,var(--success),var(--success-dark)); border-radius:3px; transition:width 0.5s; }
        .chapter-btn.mastered { border-color:var(--success); }
        .chapter-btn.mastered::after { content:'✓'; position:absolute; top:8px; right:10px; color:var(--success); font-weight:800; font-size:0.9rem; }
        .practice-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .back-btn { background:var(--card); border:none; border-radius:50%; width:44px; height:44px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; cursor:pointer; box-shadow:var(--shadow); }
        .back-btn:active { transform:scale(0.9); }
        .progress-ring { display:flex; align-items:center; gap:8px; }
        .progress-circle { width:50px; height:50px; position:relative; }
        .progress-circle svg { transform:rotate(-90deg); }
        .progress-circle .bg { fill:none; stroke:#eee; stroke-width:4; }
        .progress-circle .progress { fill:none; stroke:var(--success); stroke-width:4; stroke-linecap:round; transition:stroke-dashoffset 0.5s ease; }
        .progress-text { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:0.8rem; font-weight:700; color:var(--success); }
        .word-card { background:var(--card); border-radius:var(--radius); padding:30px 24px; text-align:center; box-shadow:var(--shadow); margin-bottom:20px; }
        .word-hint { font-size:0.95rem; color:var(--text-light); margin-bottom:10px; }
        .word-chinese { font-size:2rem; font-weight:800; color:var(--primary); margin-bottom:8px; }
        .word-type { display:inline-block; background:#FFF0F5; color:var(--primary); font-size:0.8rem; font-weight:700; padding:4px 12px; border-radius:20px; margin-bottom:8px; }
        .word-status { font-size:0.75rem; color:var(--text-light); margin-top:4px; }
        .word-status span { display:inline-block; padding:2px 8px; border-radius:10px; font-weight:600; }
        .new-badge { background:#FFF0F5; color:var(--primary); }
        .review-badge { background:#F0FFF4; color:var(--success-dark); }
        .mastered-badge { background:#E8F4FD; color:#3498DB; }
        .word-input-wrap { margin-bottom:20px; }
        .word-input { width:100%; padding:18px 20px; border:3px solid #E8E8E8; border-radius:16px; font-size:1.6rem; font-weight:800; text-align:center; text-transform:lowercase; font-family:inherit; transition:all 0.2s; background:white; letter-spacing:0.1em; }
        .word-input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 4px rgba(255,107,157,0.15); }
        .word-input.correct { border-color:var(--success); background:rgba(78,205,196,0.08); color:var(--success); }
        .word-input.incorrect { border-color:var(--danger); background:rgba(255,107,107,0.08); animation:shake 0.5s ease; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
        .action-btns { display:flex; gap:12px; }
        .btn { flex:1; padding:16px 24px; border:none; border-radius:var(--radius); font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.2s; font-family:inherit; }
        .btn:active { transform:scale(0.97); }
        .btn-primary { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; box-shadow:0 4px 15px rgba(255,107,157,0.4); }
        .btn-success { background:linear-gradient(135deg,var(--success),var(--success-dark)); color:white; box-shadow:0 4px 15px rgba(78,205,196,0.4); }
        .btn-secondary { background:#f0f0f0; color:var(--text); }
        .feedback { padding:14px; border-radius:var(--radius); text-align:center; margin-bottom:16px; font-weight:600; animation:popIn 0.3s ease; display:none; }
        .feedback.show { display:block; }
        .feedback.error { background:rgba(255,107,107,0.12); color:var(--danger); }
        .feedback.hint { background:rgba(255,217,61,0.12); color:#B8860B; }
        .feedback.success { background:rgba(78,205,196,0.12); color:var(--success-dark); }
        @keyframes popIn { 0%{opacity:0;transform:scale(0.9)} 50%{transform:scale(1.02)} 100%{opacity:1;transform:scale(1)} }
        .correct-word-show { font-size:1.8rem; font-weight:800; color:var(--success); letter-spacing:0.12em; margin:6px 0; }
        .complete-card { background:var(--card); border-radius:var(--radius); padding:40px 24px; text-align:center; box-shadow:var(--shadow); }
        .complete-icon { font-size:5rem; margin-bottom:20px; animation:bounce 1s ease infinite; }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        .complete-title { font-size:1.8rem; font-weight:800; color:var(--success); margin-bottom:12px; }
        .complete-stats { display:flex; justify-content:center; gap:30px; margin:24px 0; }
        .complete-stat { text-align:center; }
        .complete-stat-value { font-size:2rem; font-weight:800; color:var(--primary); }
        .complete-stat-label { font-size:0.85rem; color:var(--text-light); }
        .word-list { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; margin-bottom:20px; }
        .word-list-header { display:grid; grid-template-columns:1fr auto auto; gap:8px; padding:12px 16px; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; font-size:0.85rem; font-weight:700; }
        .word-list-item { display:grid; grid-template-columns:1fr auto auto; gap:8px; padding:12px 16px; border-bottom:1px solid #F5F5F5; align-items:center; }
        .word-list-item:last-child { border-bottom:none; }
        .wl-word { font-weight:700; font-size:0.95rem; }
        .wl-cn { font-size:0.8rem; color:var(--text-light); margin-top:2px; }
        .wl-status { font-size:0.75rem; font-weight:700; padding:3px 8px; border-radius:10px; white-space:nowrap; }
        .wl-status.s0 { background:#F5F5F5; color:#999; }
        .wl-status.s1 { background:#FFF0F5; color:var(--primary); }
        .wl-status.s2 { background:#FFF8E7; color:#B8860B; }
        .wl-status.s3 { background:#F0FFF4; color:var(--success-dark); }
        .wl-next { font-size:0.72rem; color:var(--text-light); }
        .filter-tabs { display:flex; gap:8px; margin-bottom:16px; overflow-x:auto; padding-bottom:4px; }
        .filter-tab { padding:7px 14px; border:none; border-radius:20px; font-size:0.8rem; font-weight:700; cursor:pointer; white-space:nowrap; font-family:inherit; transition:all 0.2s; background:#F0F0F0; color:var(--text); }
        .filter-tab.active { background:var(--primary); color:white; }
        .chapter-select { width:100%; padding:10px 14px; border:2px solid #E8E8E8; border-radius:12px; font-size:0.9rem; font-family:inherit; margin-bottom:16px; background:white; }
        .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:white; display:flex; justify-content:space-around; padding:12px 0; padding-bottom:calc(12px + var(--safe-bottom)); box-shadow:0 -4px 20px rgba(0,0,0,0.08); z-index:100; }
        .nav-item { display:flex; flex-direction:column; align-items:center; gap:4px; background:none; border:none; cursor:pointer; color:var(--text-light); font-size:0.7rem; font-family:inherit; transition:color 0.2s; }
        .nav-item.active { color:var(--primary); }
        .nav-item-icon { font-size:1.4rem; }
        .stars { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1000; display:none; }
        .stars.show { display:block; }
        .star { position:absolute; font-size:2rem; animation:starFall 1s ease forwards; }
        @keyframes starFall { 0%{opacity:1;transform:translateY(0) scale(1) rotate(0deg)} 100%{opacity:0;transform:translateY(-100px) scale(0.5) rotate(360deg)} }
        .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-100px); background:var(--text); color:white; padding:12px 24px; border-radius:30px; font-weight:600; z-index:1000; transition:transform 0.3s ease; }
        .toast.show { transform:translateX(-50%) translateY(0); }
    </style>
</head>

<div class="app">
    <header class="header">
        <h1>&#127775; 雪梨拼读</h1>
        <p>每天进步一点点</p>
    </header>
    <main class="content">
        <div id="home-page" class="page active">

            </div>
            <div id="chapter-list"></div>
        </div>
        <div id="practice-page" class="page">
            <div class="practice-header">
                <button class="back-btn" onclick="goHome()">&#8592;</button>
                <div style="font-size:0.85rem;font-weight:700;color:var(--text-light);max-width:160px;text-align:center;line-height:1.3" id="chapter-name-label"></div>
                <div class="progress-ring">
                    <div class="progress-circle">
                        <svg width="50" height="50"><circle class="bg" cx="25" cy="25" r="20"></circle><circle class="progress" id="progress-circle" cx="25" cy="25" r="20" stroke-dasharray="125.6" stroke-dashoffset="125.6"></circle></svg>
                        <span class="progress-text" id="progress-text">0/0</span>
                    </div>
                </div>
            </div>
            <div class="word-card">
                <div class="word-hint">看中文，拼写英文单词：</div>
                <div class="word-chinese" id="word-chinese">苹果</div>
                <div><span class="word-type" id="word-type">n.</span></div>
                <div class="word-status" id="word-status"></div>
            </div>
            <div class="feedback" id="feedback"></div>
            <div class="word-input-wrap">
                <input type="text" class="word-input" id="word-input" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="输入英文单词…" />
            </div>
            <div class="action-btns">
                <button class="btn btn-secondary" onclick="showHint()">&#128161; 提示</button>
                <button class="btn btn-primary" onclick="checkAnswer()">&#10003; 检查</button>
            </div>
        </div>
        <div id="complete-page" class="page">
            <div class="complete-card">
                <div class="complete-icon">&#127881;</div>
                <div class="complete-title">太棒了！</div>
                <p style="color:var(--text-light)">你完成了本章节的学习！</p>
                <div class="complete-stats">
                    <div class="complete-stat"><div class="complete-stat-value" id="complete-correct">0</div><div class="complete-stat-label">正确</div></div>
                    <div class="complete-stat"><div class="complete-stat-value" id="complete-wrong">0</div><div class="complete-stat-label">错误</div></div>
                    <div class="complete-stat"><div class="complete-stat-value" id="complete-hints">0</div><div class="complete-stat-label">提示</div></div>
                </div>
                <div class="action-btns">
                    <button class="btn btn-secondary" onclick="goHome()">返回主页</button>
                    <button class="btn btn-success" onclick="reviewMistakes()">复习错题</button>
                </div>
            </div>
        </div>
        <div id="progress-page" class="page">
            <div class="section-title">学习进度</div>
            <select class="chapter-select" id="progress-chapter-select" onchange="renderWordList()"></select>
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all" onclick="setFilter(this)">全部</button>
                <button class="filter-tab" data-filter="0" onclick="setFilter(this)">未学习</button>
                <button class="filter-tab" data-filter="1" onclick="setFilter(this)">学习中</button>
                <button class="filter-tab" data-filter="3" onclick="setFilter(this)">已掌握</button>
            </div>
            <div id="word-list-container"></div>
        </div>
    </main>
    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('home',this)"><span class="nav-item-icon">&#127968;</span><span>首页</span></button>
        <button class="nav-item" onclick="switchTab('progress',this)"><span class="nav-item-icon">&#128202;</span><span>进度</span></button>
    </nav>
</div>
<div class="stars" id="stars"></div>
<div class="toast" id="toast"></div>

const ALL_WORDS = CHAPTERS.flatMap(ch => ch.words);

// ===== 存储层 =====
const STORAGE_KEY = 'xueli_v2_progress';
function loadData() {
  try { const r=localStorage.getItem(STORAGE_KEY); if(r) return JSON.parse(r); } catch(e){}
  return { words:{}, streak:0, lastDate:null };
}
function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
function getWordRecord(data, word) {
  if (!data.words[word]) data.words[word]={status:0,correct:0,wrong:0,hint:0,nextReview:null,lastSeen:null};
  return data.words[word];
}
function markCorrect(data, word) {
  const r=getWordRecord(data,word); r.correct++; r.lastSeen=Date.now();
  const intervals=[1,2,4,7,15,30];
  r.nextReview=Date.now()+intervals[Math.min(r.correct-1,intervals.length-1)]*86400000;
  r.status=r.correct>=3?3:r.correct>=2?2:1; saveData(data);
}
function markWrong(data, word) {
  const r=getWordRecord(data,word); r.wrong++; r.lastSeen=Date.now();
  r.nextReview=Date.now()+86400000; r.status=Math.max(r.status-1,0); saveData(data);
}
function markHint(data, word) { const r=getWordRecord(data,word); r.hint++; saveData(data); }

// ===== 状态 =====
let appData=loadData();
let state={ currentChapterId:null, currentWordIndex:0, words:[], correctCount:0, wrongCount:0, hintCount:0, sessionMistakes:[] };

// ===== 首页 =====
function updateHomeStats() {
  appData=loadData();
  let total=0, learned=0;
  ALL_WORDS.forEach(w=>{ total++; const r=appData.words[w.word]; if(r&&r.status>=3) learned++; });
  document.getElementById('stat-total').textContent=total;
  document.getElementById('stat-learned').textContent=learned;
  document.getElementById('stat-streak').textContent=appData.streak||0;
  renderChapterList();
}
function renderChapterList() {
  const container=document.getElementById('chapter-list'); container.innerHTML='';
  const groups={};
  CHAPTERS.forEach(ch=>{ if(!groups[ch.parentLabel]) groups[ch.parentLabel]=[]; groups[ch.parentLabel].push(ch); });
  Object.keys(groups).forEach(gName=>{
    const gt=document.createElement('div'); gt.className='section-title'; gt.textContent=gName; container.appendChild(gt);
    const grid=document.createElement('div'); grid.className='chapter-grid';
    groups[gName].forEach(ch=>{
      let chTotal=ch.words.length, chMastered=0;
      ch.words.forEach(w=>{ const r=appData.words[w.word]; if(r&&r.status>=3) chMastered++; });
      const pct=chTotal>0?Math.round(chMastered/chTotal*100):0;
      const btn=document.createElement('button');
      btn.className='chapter-btn'+(pct===100?' mastered':'');
      btn.innerHTML='<div class="ch-icon">'+ch.icon+'</div><div class="ch-title">'+ch.title+'</div><div class="ch-sub">'+ch.words.length+' 词 · 掌握 '+chMastered+'/'+chTotal+'</div><div class="ch-bar-wrap"><div class="ch-bar" style="width:'+pct+'%"></div></div>';
      btn.onclick=()=>startChapter(ch.id); grid.appendChild(btn);
    });
    container.appendChild(grid);
  });
}

// ===== 练习 =====
function startChapter(chapterId) {
  const ch=CHAPTERS.find(c=>c.id===chapterId); if(!ch) return;
  appData=loadData();
  state.currentChapterId=chapterId; state.currentWordIndex=0;
  state.correctCount=0; state.wrongCount=0; state.hintCount=0; state.sessionMistakes=[];
  const now=Date.now();
  const review=ch.words.filter(w=>{ const r=appData.words[w.word]; return r&&r.nextReview&&r.nextReview<=now&&r.status>=1; });
  const fresh=ch.words.filter(w=>{ const r=appData.words[w.word]; return !r||r.status===0; });
  const rest=ch.words.filter(w=>{ const r=appData.words[w.word]; return r&&r.status>=1&&(!r.nextReview||r.nextReview>now); });
  state.words=[...review.sort(()=>Math.random()-.5),...fresh.sort(()=>Math.random()-.5),...rest.sort(()=>Math.random()-.5)];
  document.getElementById('chapter-name-label').textContent=ch.title;
  switchPage('practice-page'); renderCurrentWord(); updateProgress();
}
function renderCurrentWord() {
  const word=state.words[state.currentWordIndex]; if(!word) return completeChapter();
  appData=loadData();
  const r=getWordRecord(appData,word.word);
  document.getElementById('word-chinese').textContent=word.chinese;
  document.getElementById('word-type').textContent='';
  const labels=['未学习','学习中','已熟悉','已掌握'];
  const cls=['new-badge','review-badge','review-badge','mastered-badge'];
  const sc=Math.min(r.status,3);
  let statusHtml='<span class="'+cls[sc]+'">'+labels[sc]+'</span>';
  if(r.correct>0) statusHtml+='&nbsp; 已答对 '+r.correct+' 次';
  document.getElementById('word-status').innerHTML=statusHtml;
  const input=document.getElementById('word-input');
  input.value=''; input.className='word-input'; input.disabled=false; input.placeholder='输入英文单词…';
  const fb=document.getElementById('feedback'); fb.className='feedback'; fb.textContent='';
  setTimeout(()=>input.focus(),100);
}
function showHint() {
  const word=state.words[state.currentWordIndex];
  const input=document.getElementById('word-input');
  const cur=input.value.toLowerCase();
  let newVal='';
  for(let i=0;i<word.word.length;i++){
    if(i<cur.length&&cur[i]===word.word[i]) newVal+=word.word[i];
    else { newVal+=word.word[i]; break; }
  }
  input.value=newVal; state.hintCount++; markHint(appData,word.word);
  const fb=document.getElementById('feedback');
  fb.className='feedback hint show';
  fb.textContent='💡 提示：已揭示到第 '+newVal.length+' 个字母，共 '+word.word.length+' 个字母';
  input.focus();
}
function checkAnswer() {
  const word=state.words[state.currentWordIndex];
  const input=document.getElementById('word-input');
  const ua=input.value.trim().toLowerCase();
  if(!ua){ showToast('请先输入单词！'); return; }
  const fb=document.getElementById('feedback');
  if(ua===word.word.toLowerCase()){
    state.correctCount++; input.className='word-input correct'; input.disabled=true;
    fb.className='feedback success show';
    fb.innerHTML='🎉 完全正确！<div class="correct-word-show">'+word.word+'</div>';
    markCorrect(appData,word.word); showStars();
    setTimeout(()=>{ state.currentWordIndex++; updateProgress(); renderCurrentWord(); },1400);
  } else {
    state.wrongCount++;
    if(!state.sessionMistakes.find(w=>w.word===word.word)) state.sessionMistakes.push(word);
    markWrong(appData,word.word);
    input.className='word-input incorrect';
    fb.className='feedback error show';
    fb.textContent='❌ 再试一次！提示：首字母是 "'+word.word[0]+'"，共 '+word.word.length+' 个字母';
    setTimeout(()=>{ input.className='word-input'; input.value=''; input.disabled=false; fb.className='feedback'; input.focus(); },1300);
  }
}
function updateProgress() {
  const total=state.words.length, cur=state.currentWordIndex;
  const pct=total>0?(cur/total)*100:0;
  const circle=document.getElementById('progress-circle');
  const c=2*Math.PI*20;
  circle.style.strokeDashoffset=c-(pct/100)*c;
  document.getElementById('progress-text').textContent=cur+'/'+total;
}
function completeChapter() {
  appData=loadData();
  const today=new Date().toDateString(), yest=new Date(Date.now()-86400000).toDateString();
  if(appData.lastDate!==today){
    appData.streak=(appData.lastDate===yest)?(appData.streak||0)+1:1;
    appData.lastDate=today; saveData(appData);
  }
  document.getElementById('complete-correct').textContent=state.correctCount;
  document.getElementById('complete-wrong').textContent=state.wrongCount;
  document.getElementById('complete-hints').textContent=state.hintCount;
  switchPage('complete-page');
}
function reviewMistakes() {
  if(state.sessionMistakes.length>0){
    state.words=[...state.sessionMistakes].sort(()=>Math.random()-.5);
    state.currentWordIndex=0; state.correctCount=0; state.wrongCount=0;
    state.hintCount=0; state.sessionMistakes=[];
    switchPage('practice-page'); renderCurrentWord(); updateProgress();
  } else { showToast('没有错题可以复习！'); }
}

let currentFilter='all';
function initProgressPage() {
  appData=loadData();
  const sel=document.getElementById('progress-chapter-select');
  sel.innerHTML='<option value="all">所有章节</option>';
  CHAPTERS.forEach(ch=>{ const opt=document.createElement('option'); opt.value=ch.id; opt.textContent=ch.title+' ('+ch.words.length+'词)'; sel.appendChild(opt); });

}
function setFilter(btn) {
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active'); currentFilter=btn.dataset.filter; renderWordList();
}
function renderWordList() {
  appData=loadData();
  const chId=document.getElementById('progress-chapter-select').value;
  let words=chId==='all'?ALL_WORDS:(CHAPTERS.find(c=>c.id===chId)||{words:[]}).words;
  if(currentFilter!=='all'){
    const fs=parseInt(currentFilter);
    words=words.filter(w=>{ const r=appData.words[w.word]; const s=r?r.status:0; return fs===3?s>=3:s===fs; });
  }
  const sLabels=['未学习','学习中','已熟悉','已掌握'];
  const sCls=['s0','s1','s2','s3'];
  const container=document.getElementById('word-list-container');
  if(words.length===0){ container.innerHTML='<div style="text-align:center;padding:30px;color:var(--text-light)">没有符合条件的单词</div>'; return; }
  let html='<div class="word-list"><div class="word-list-header"><span>单词</span><span>状态</span><span>复习计划</span></div>';
  words.forEach(w=>{
    const r=appData.words[w.word]; const s=r?Math.min(r.status,3):0;
    let nxt='-';
    if(r&&r.nextReview&&s<3){ const d=Math.ceil((r.nextReview-Date.now())/86400000); nxt=d<=0?'今天':d+'天后'; }
    else if(s>=3) nxt='已掌握';
    html+='<div class="word-list-item"><div><div class="wl-word">'+w.word+'</div><div class="wl-cn">'+w.chinese+'</div></div><span class="wl-status '+sCls[s]+'">'+sLabels[s]+'</span><span class="wl-next">'+nxt+'</span></div>';
  });
  html+='</div>';
  container.innerHTML=html;
}

// ===== 通用 =====
function switchPage(id){ document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function goHome(){ switchPage('home-page'); updateHomeStats(); }
function switchTab(tab,el){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(el) el.classList.add('active');
  if(tab==='home'){ switchPage('home-page'); updateHomeStats(); }
  else if(tab==='progress'){ switchPage('progress-page'); initProgressPage(); }
}
function showStars(){
  const stars=document.getElementById('stars'); stars.classList.add('show'); stars.innerHTML='';
  const em=['⭐','🌟','✨','💫','🎉'];
  for(let i=0;i<8;i++){ const s=document.createElement('div'); s.className='star'; s.textContent=em[Math.floor(Math.random()*em.length)]; s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*50+30+'%'; s.style.animationDelay=Math.random()*0.3+'s'; stars.appendChild(s); }
  setTimeout(()=>stars.classList.remove('show'),1500);
}
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('word-input').addEventListener('keydown',e=>{ if(e.key==='Enter') checkAnswer(); });
  updateHomeStats();
});
</script>
