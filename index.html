            --warning: #FFD93D;
            --danger: #FF6B6B;
            --bg: #FFF5F8;
            --card: #FFFFFF;
            --text: #2D3436;
            --text-light: #636E72;
            --shadow: 0 8px 30px rgba(255, 107, 157, 0.15);

            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { font-family: 'Nunito', -apple-system, sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); overflow-x: hidden; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }
        .app { max-width: 768px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 20px; padding-top: calc(20px + var(--safe-top)); border-radius: 0 0 30px 30px; text-align: center; }
        .header h1 { font-size: 1.8rem; font-weight: 800; }
        .header p { font-size: 0.9rem; opacity: 0.9; margin-top: 4px; }
        .content { flex: 1; padding: 20px; padding-bottom: calc(100px + var(--safe-bottom)); }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .stat-card { background: var(--card); border-radius: var(--radius); padding: 16px 12px; text-align: center; box-shadow: var(--shadow); }
        .stat-icon { font-size: 1.8rem; margin-bottom: 8px; }
        .stat-value { font-size: 1.6rem; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 0.75rem; color: var(--text-light); margin-top: 4px; }
        .section-title { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: ''; width: 4px; height: 20px; background: var(--primary); border-radius: 2px; }
        .chapter-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .chapter-btn { background: var(--card); border-radius: var(--radius); padding: 20px 16px; text-align: center; box-shadow: var(--shadow); cursor: pointer; transition: all 0.2s; border: none; width: 100%; font-family: inherit; }
        .chapter-btn:active { transform: scale(0.97); }
        .chapter-btn .ch-icon { font-size: 2rem; margin-bottom: 8px; }
        .chapter-btn .ch-title { font-size: 0.95rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
        .chapter-btn .ch-progress { font-size: 0.75rem; color: var(--text-light); }
        .practice-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { background: var(--card); border: none; border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; box-shadow: var(--shadow); }
        .back-btn:active { transform: scale(0.9); }
        .progress-ring { display: flex; align-items: center; gap: 8px; }
        .progress-circle { width: 50px; height: 50px; position: relative; }
        .progress-circle svg { transform: rotate(-90deg); }
        .progress-circle .bg { fill: none; stroke: #eee; stroke-width: 4; }
        .progress-circle .progress { fill: none; stroke: var(--success); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
        .progress-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 0.8rem; font-weight: 700; color: var(--success); }
        .word-card { background: var(--card); border-radius: var(--radius); padding: 30px 24px; text-align: center; box-shadow: var(--shadow); margin-bottom: 24px; }
        .word-hint { font-size: 1rem; color: var(--text-light); margin-bottom: 16px; }
        .word-chinese { font-size: 1.8rem; font-weight: 700; color: var(--primary); margin-bottom: 12px; }
        .word-type { font-size: 0.9rem; color: var(--text-light); margin-bottom: 20px; }
        .letter-inputs { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .letter-input { width: 52px; height: 60px; border: 3px solid #E8E8E8; border-radius: 12px; font-size: 1.8rem; font-weight: 800; text-align: center; text-transform: lowercase; font-family: inherit; transition: all 0.2s; background: white; }
        .letter-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(255, 107, 157, 0.2); }
        .letter-input.correct { border-color: var(--success); background: rgba(78, 205, 196, 0.1); color: var(--success); }
        .letter-input.incorrect { border-color: var(--danger); background: rgba(255, 107, 107, 0.1); animation: shake 0.5s ease; }
        .letter-input.hint { border-color: var(--warning); background: rgba(255, 217, 61, 0.1); }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-5px); } 40%, 80% { transform: translateX(5px); } }
        .action-btns { display: flex; gap: 12px; }
        .btn { flex: 1; padding: 16px 24px; border: none; border-radius: var(--radius); font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: inherit; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4); }
        .btn-success { background: linear-gradient(135deg, var(--success), var(--success-dark)); color: white; box-shadow: 0 4px 15px rgba(78, 205, 196, 0.4); }
        .btn-secondary { background: #f0f0f0; color: var(--text); }
        .feedback { padding: 16px; border-radius: var(--radius); text-align: center; margin-bottom: 20px; font-weight: 600; animation: popIn 0.3s ease; display: none; }
        .feedback.show { display: block; }
        .feedback.error { background: rgba(255, 107, 107, 0.15); color: var(--danger); }
        .feedback.hint { background: rgba(255, 217, 61, 0.15); color: #B8860B; }
        .feedback.success { background: rgba(78, 205, 196, 0.15); color: var(--success-dark); }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 50% { transform: scale(1.02); } 100% { opacity: 1; transform: scale(1); } }
        .complete-card { background: var(--card); border-radius: var(--radius); padding: 40px 24px; text-align: center; box-shadow: var(--shadow); }
        .complete-icon { font-size: 5rem; margin-bottom: 20px; animation: bounce 1s ease infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .complete-title { font-size: 1.8rem; font-weight: 800; color: var(--success); margin-bottom: 12px; }
        .complete-stats { display: flex; justify-content: center; gap: 30px; margin: 24px 0; }
        .complete-stat { text-align: center; }
        .complete-stat-value { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .complete-stat-label { font-size: 0.85rem; color: var(--text-light); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 12px 0; padding-bottom: calc(12px + var(--safe-bottom)); box-shadow: 0 -4px 20px rgba(0,0,0,0.08); z-index: 100; }

        .nav-item.active { color: var(--primary); }
        .nav-item-icon { font-size: 1.4rem; }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; display: none; }
        .stars.show { display: block; }
        .star { position: absolute; font-size: 2rem; animation: starFall 1s ease forwards; }

        .keyboard-hint { display: none !important; }

    <div class="app">
        <header class="header">
            <h1>🌟 雪梨拼读</h1>
            <p>每天进步一点点</p>
        </header>
        <main class="content">
            <div id="home-page" class="page active">
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-icon">📚</div><div class="stat-value" id="stat-total">0</div><div class="stat-label">总单词数</div></div>
                    <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value" id="stat-learned">0</div><div class="stat-label">已掌握</div></div>
                    <div class="stat-card"><div class="stat-icon">🔥</div><div class="stat-value" id="stat-streak">0</div><div class="stat-label">连续天数</div></div>
                </div>
                <div class="section-title">选择章节开始学习</div>
                <div id="chapter-list" class="chapter-grid"></div>
            </div>
            <div id="practice-page" class="page">
                <div class="practice-header">
                    <button class="back-btn" onclick="goHome()">←</button>
                    <div class="progress-ring">
                        <div class="progress-circle">
                            <svg width="50" height="50"><circle class="bg" cx="25" cy="25" r="20"></circle><circle class="progress" id="progress-circle" cx="25" cy="25" r="20" stroke-dasharray="125.6" stroke-dashoffset="125.6"></circle></svg>
                            <span class="progress-text" id="progress-text">0/0</span>
                        </div>
                    </div>
                </div>
                <div class="word-card">
                    <div class="word-hint">请拼写这个单词：</div>
                    <div class="word-chinese" id="word-chinese">苹果</div>
                    <div class="word-type" id="word-type">n. 名词</div>
                </div>
                <div class="feedback" id="feedback"></div>
                <div class="letter-inputs" id="letter-inputs"></div>
                <div class="keyboard-hint" id="keyboard-hint"></div>
                <div class="action-btns">
                    <button class="btn btn-secondary" id="hint-btn" onclick="showHint()">💡 提示</button>
                    <button class="btn btn-primary" id="check-btn" onclick="checkAnswer()">✓ 检查</button>
                </div>
            </div>
            <div id="complete-page" class="page">
                <div class="complete-card">
                    <div class="complete-icon">🎉</div>
                    <div class="complete-title">太棒了！</div>
                    <p style="color: var(--text-light);">你完成了本章节的学习！</p>
                    <div class="complete-stats">
                        <div class="complete-stat"><div class="complete-stat-value" id="complete-correct">0</div><div class="complete-stat-label">正确</div></div>
                        <div class="complete-stat"><div class="complete-stat-value" id="complete-wrong">0</div><div class="complete-stat-label">错误</div></div>
                        <div class="complete-stat"><div class="complete-stat-value" id="complete-hints">0</div><div class="complete-stat-label">提示</div></div>
                    </div>
                    <div class="action-btns">
                        <button class="btn btn-secondary" onclick="goHome()">返回主页</button>
                        <button class="btn btn-success" onclick="reviewMistakes()">复习错题</button>
                    </div>
                </div>
            </div>
        </main>
        <nav class="bottom-nav">
            <button class="nav-item active" onclick="switchTab('home')"><span class="nav-item-icon">🏠</span><span>首页</span></button>
            <button class="nav-item" onclick="switchTab('progress')"><span class="nav-item-icon">📊</span><span>进度</span></button>
        </nav>
    </div>
    <div class="stars" id="stars"></div>
    <div class="toast" id="toast"></div>

        let state = { currentChapter: null, currentWordIndex: 0, words: [], correctCount: 0, wrongCount: 0, hintCount: 0, sessionMistakes: [], streak: 0 };
        const STORAGE_KEY = 'xueli_spelling_progress';
        function loadProgress() { const saved = localStorage.getItem(STORAGE_KEY); if (saved) return JSON.parse(saved); return { chapterProgress: {}, streak: 0, lastPracticeDate: null }; }
        function saveProgress() { const data = loadProgress(); if (state.currentChapter) { if (!data.chapterProgress[state.currentChapter]) data.chapterProgress[state.currentChapter] = { learned: 0, total: 0 }; data.chapterProgress[state.currentChapter].learned = Math.max(data.chapterProgress[state.currentChapter].learned, state.correctCount); data.chapterProgress[state.currentChapter].total = state.words.length; } data.streak = state.streak; data.lastPracticeDate = new Date().toDateString(); localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
        function switchPage(pageId) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(pageId).classList.add('active'); }
        function goHome() { switchPage('home-page'); updateHomeStats(); }
        function updateHomeStats() { const progress = loadProgress(); let totalWords = 0, learnedWords = 0; WORDS_DATA.forEach(ch => { totalWords += ch.words.length; if (progress.chapterProgress[ch.id]) learnedWords += progress.chapterProgress[ch.id].learned || 0; }); document.getElementById('stat-total').textContent = totalWords; document.getElementById('stat-learned').textContent = learnedWords; document.getElementById('stat-streak').textContent = progress.streak; renderChapterList(); }
        function renderChapterList() { const progress = loadProgress(); const container = document.getElementById('chapter-list'); container.innerHTML = ''; WORDS_DATA.forEach(ch => { const chProg = progress.chapterProgress[ch.id] || { learned: 0, total: ch.words.length }; const total = ch.words.length, learned = chProg.learned; const btn = document.createElement('button'); btn.className = 'chapter-btn'; btn.innerHTML = '<div class="ch-icon">' + ch.icon + '</div><div class="ch-title">' + ch.title + '</div><div class="ch-progress">' + learned + '/' + total + ' 已掌握</div>'; btn.onclick = () => startChapter(ch.id); container.appendChild(btn); }); }
        function startChapter(chapterId) { const chapter = WORDS_DATA.find(c => c.id === chapterId); if (!chapter) return; state.currentChapter = chapterId; state.currentWordIndex = 0; state.correctCount = 0; state.wrongCount = 0; state.hintCount = 0; state.sessionMistakes = []; state.words = [...chapter.words].sort(() => Math.random() - 0.5); switchPage('practice-page'); renderCurrentWord(); updateProgress(); }
        function renderCurrentWord() { const word = state.words[state.currentWordIndex]; if (!word) return completeChapter(); document.getElementById('word-chinese').textContent = word.chinese; document.getElementById('word-type').textContent = word.type; const feedback = document.getElementById('feedback'); feedback.className = 'feedback'; feedback.textContent = ''; const container = document.getElementById('letter-inputs'); container.innerHTML = ''; for (let i = 0; i < word.word.length; i++) { const input = document.createElement('input'); input.type = 'text'; input.maxLength = 1; input.className = 'letter-input'; input.dataset.index = i; input.autocomplete = 'off'; input.addEventListener('input', handleLetterInput); input.addEventListener('keydown', handleKeydown); container.appendChild(input); } setTimeout(() => container.querySelector('.letter-input')?.focus(), 100); document.getElementById('keyboard-hint').textContent = ''; }
        function handleLetterInput(e) { const input = e.target; input.value = input.value.toLowerCase(); if (input.value) { const nextIndex = parseInt(input.dataset.index) + 1; const nextInput = document.querySelector('.letter-input[data-index="' + nextIndex + '"]'); if (nextInput) nextInput.focus(); } }
        function handleKeydown(e) { if (e.key === 'Backspace' && !e.target.value) { const prevIndex = parseInt(e.target.dataset.index) - 1; const prevInput = document.querySelector('.letter-input[data-index="' + prevIndex + '"]'); if (prevInput) prevInput.focus(); } else if (e.key === 'Enter') checkAnswer(); }
        function showHint() { const word = state.words[state.currentWordIndex]; const inputs = document.querySelectorAll('.letter-input'); let hintIndex = -1; for (let i = 0; i < inputs.length; i++) { if (!inputs[i].value || inputs[i].value.toLowerCase() !== word.word[i]) { hintIndex = i; break; } } if (hintIndex >= 0) { inputs[hintIndex].value = word.word[hintIndex]; inputs[hintIndex].classList.add('hint'); state.hintCount++; const feedback = document.getElementById('feedback'); feedback.className = 'feedback hint show'; feedback.textContent = '💡 提示：第 ' + (hintIndex + 1) + ' 个字母是 "' + word.word[hintIndex] + '"'; } }
        function checkAnswer() { const word = state.words[state.currentWordIndex]; const inputs = document.querySelectorAll('.letter-input'); let userAnswer = ''; inputs.forEach(input => { userAnswer += input.value.toLowerCase(); }); if (userAnswer.length < word.word.length) { showToast('请输入完整的单词！'); return; } const feedback = document.getElementById('feedback'); feedback.className = 'feedback show'; if (userAnswer === word.word) { state.correctCount++; inputs.forEach(input => input.classList.add('correct')); feedback.classList.add('success'); feedback.textContent = '🎉 太棒了！完全正确！'; showStars(); setTimeout(() => { state.currentWordIndex++; updateProgress(); renderCurrentWord(); }, 1200); } else { state.wrongCount++; state.sessionMistakes.push(word); inputs.forEach((input, i) => { if (input.value.toLowerCase() !== word.word[i]) input.classList.add('incorrect'); }); feedback.classList.add('error'); feedback.textContent = '❌ 再试一次！'; setTimeout(() => { inputs.forEach(input => { input.classList.remove('incorrect'); input.value = ''; }); inputs[0]?.focus(); feedback.className = 'feedback'; }, 1000); } }
        function updateProgress() { const total = state.words.length; const current = state.currentWordIndex; const percent = total > 0 ? (current / total) * 100 : 0; const circle = document.getElementById('progress-circle'); const circumference = 2 * Math.PI * 20; circle.style.strokeDashoffset = circumference - (percent / 100) * circumference; document.getElementById('progress-text').textContent = current + '/' + total; }
        function completeChapter() { const progress = loadProgress(); const today = new Date().toDateString(); if (progress.lastPracticeDate !== today) { progress.streak = (progress.lastPracticeDate === new Date(Date.now() - 86400000).toDateString()) ? progress.streak + 1 : 1; } state.streak = progress.streak; saveProgress(); document.getElementById('complete-correct').textContent = state.correctCount; document.getElementById('complete-wrong').textContent = state.wrongCount; document.getElementById('complete-hints').textContent = state.hintCount; switchPage('complete-page'); }
        function reviewMistakes() { if (state.sessionMistakes.length > 0) { state.words = [...state.sessionMistakes].sort(() => Math.random() - 0.5); state.currentWordIndex = 0; state.correctCount = 0; state.wrongCount = 0; state.hintCount = 0; state.sessionMistakes = []; switchPage('practice-page'); renderCurrentWord(); updateProgress(); } else { showToast('没有错题可以复习！'); } }
        function showStars() { const stars = document.getElementById('stars'); stars.classList.add('show'); stars.innerHTML = ''; const emojis = ['⭐', '🌟', '✨', '💫', '🎉']; for (let i = 0; i < 8; i++) { const star = document.createElement('div'); star.className = 'star'; star.textContent = emojis[Math.floor(Math.random() * emojis.length)]; star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 50 + 30 + '%'; star.style.animationDelay = Math.random() * 0.3 + 's'; stars.appendChild(star); } setTimeout(() => stars.classList.remove('show'), 1500); }
        function showToast(msg) { const toast = document.getElementById('toast'); toast.textContent = msg; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2000); }
        function switchTab(tab) { if (tab === 'home') { switchPage('home-page'); updateHomeStats(); } }
        document.addEventListener('DOMContentLoaded', updateHomeStats);
    </script>
